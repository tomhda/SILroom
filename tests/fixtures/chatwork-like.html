<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Chatwork Fixture</title>
    <link rel="stylesheet" href="../../styles/silroom.css">
    <style>
      html,
      body {
        background: #111827;
        color: #f8fafc;
        font-family: Meiryo, sans-serif;
        height: 100%;
        margin: 0;
      }

      #_header {
        align-items: center;
        background: #172238;
        border-bottom: 1px solid #2a3a55;
        display: flex;
        font-size: 18px;
        font-weight: 700;
        height: 48px;
        padding: 0 18px;
      }

      #_content {
        height: calc(100% - 48px);
        position: relative;
      }

      #_sideContent {
        background: #0e1726;
        border-right: 1px solid #2a3a55;
        bottom: 0;
        left: 0;
        position: absolute;
        top: 0;
        width: 300px;
      }

      #sidebarSwitch {
        align-items: center;
        border-bottom: 1px solid #2a3a55;
        display: flex;
        gap: 16px;
        height: 49px;
        padding: 0 14px;
      }

      #_roomListArea {
        bottom: 0;
        left: 0;
        overflow: auto;
        position: absolute;
        right: 0;
        top: 49px;
      }

      .fixture-category {
        align-items: center;
        color: #dbeafe;
        display: flex;
        gap: 8px;
        height: 40px;
        justify-content: space-between;
        padding: 0 14px;
      }

      #_roomListArea ul {
        list-style: none;
        margin: 0;
        padding: 0 0 24px;
      }

      #_roomListArea li[role="tab"] {
        align-items: center;
        display: flex;
        gap: 12px;
        height: 46px;
        padding: 0 16px;
      }

      #_roomListArea li[role="tab"][aria-selected="true"] {
        background: #253a63;
      }

      #_roomListArea img {
        border-radius: 50%;
        height: 28px;
        width: 28px;
      }

      .fixture-title {
        flex: 1 1 auto;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .fixture-badge {
        align-items: center;
        border-radius: 999px;
        color: #07101e;
        display: inline-flex;
        font-size: 11px;
        font-weight: 900;
        height: 20px;
        justify-content: center;
        min-width: 20px;
      }

      .fixture-badge--mention {
        background: #22c98b;
      }

      .fixture-badge--unread {
        background: #63a4ff;
      }

      #_mainContent {
        bottom: 0;
        display: grid;
        grid-template-columns: minmax(0, 1fr) 300px;
        grid-template-rows: 49px minmax(0, 1fr);
        left: 300px;
        position: absolute;
        right: 0;
        top: 0;
      }

      .roomMainContent__roomHeader {
        align-items: center;
        background: #1b2943;
        border-bottom: 1px solid #2a3a55;
        display: flex;
        grid-column: 1 / -1;
        padding: 0 16px;
      }

      .roomMainContent__currentSelectedRoom {
        min-height: 0;
        min-width: 0;
        overflow: hidden;
        position: relative;
      }

      #CurrentSelectedRoom {
        height: 100%;
        min-height: 0;
        position: relative;
      }

      #_chatContent {
        background: #111827;
        box-sizing: border-box;
        height: 100%;
        min-width: 0;
        overflow: auto;
        padding: 28px 28px 124px;
      }

      .fixture-messageStack {
        display: flex;
        flex-direction: column;
        gap: 18px;
        min-height: 1500px;
      }

      .fixture-messageStack p {
        background: #1f2d46;
        border: 1px solid #2f4161;
        border-radius: 8px;
        margin: 0;
        padding: 14px 16px;
      }

      #_chatSendArea {
        background: #172238;
        border-top: 1px solid #2a3a55;
        bottom: 0;
        height: 96px;
        left: 0;
        position: absolute;
        right: 0;
      }

      #_subContent {
        background: #0e1726;
        border-left: 1px solid #2a3a55;
        grid-column: 2;
        grid-row: 2;
      }

      #_subContentArea {
        height: 100%;
        overflow: auto;
        padding: 18px;
      }
    </style>
    <script>
      window.chrome = {
        runtime: {
          getURL(path) {
            return new URL(`../../${path}`, window.location.href).href;
          },
        },
      };
    </script>
    <script src="../../src/content/main.js" defer></script>
  </head>
  <body class="ja dark">
    <div id="_header">Chatwork</div>
    <div id="_content">
      <div id="_sideContent" class="roomListContainer">
        <div id="sidebarSwitch">チャット 自分宛て ブックマーク</div>
        <div id="_roomListArea" class="roomListWithSwitch">
          <div class="fixture-category" role="button" aria-label="サンプルA 自分宛 2">
            <span>サンプルA</span>
            <span class="fixture-badge fixture-badge--mention" aria-label="自分宛 2">2</span>
          </div>
          <div class="fixture-category" role="button" aria-label="サンプルB 未読 3">
            <span>サンプルB</span>
            <span class="fixture-badge fixture-badge--unread" aria-label="未読 3">3</span>
            <span class="fixture-category-count">(1)</span>
          </div>
          <div class="fixture-category" role="button" aria-label="サンプルC">サンプルC</div>
          <div>カテゴリー未分類のチャット</div>
          <ul>
            <li id="111111111" role="tab" aria-label="【SAMPLE】サンプル共有ルーム" aria-selected="true" data-workspace="サンプルA">
              <img src="../../assets/icons/icon-32.png?ico_group" alt="">
              <span class="fixture-title">【SAMPLE】サンプル共有ルーム</span>
              <span class="fixture-badge fixture-badge--mention" aria-label="自分宛 2">2</span>
            </li>
            <li id="222222222" role="tab" aria-label="【SAMPLE】制作チェック" data-workspace="サンプルA">
              <img src="../../assets/icons/icon-32.png?ico_group" alt="">
              <span class="fixture-title">【SAMPLE】制作チェック</span>
              <span class="fixture-badge fixture-badge--unread" aria-label="未読 4">4</span>
            </li>
            <li id="294514502" role="tab" aria-label="サンプル 太郎">
              <img src="../../assets/icons/icon-32.png?user-a" alt="">
              <span class="fixture-title">サンプル 太郎</span>
            </li>
            <li id="294514503" role="tab" aria-label="マイチャット">
              <img src="../../assets/icons/icon-32.png?my-chat" alt="">
              <span class="fixture-title">マイチャット</span>
            </li>
            <li id="294514505" role="tab" aria-label="デモ 花子" data-chatwork-to-me="true">
              <img src="../../assets/icons/icon-32.png?user-b" alt="">
              <span class="fixture-title">デモ 花子</span>
              <span class="fixture-badge fixture-badge--unread" aria-label="未読 1"><span><span>1</span></span></span>
            </li>
            <li id="333333333" role="tab" aria-label="サンプル日報" data-workspace="サンプルB">
              <img src="../../assets/icons/icon-32.png?ico_group" alt="">
              <span class="fixture-title">サンプル日報</span>
              <span class="fixture-badge fixture-badge--unread" aria-label="未読 3">3</span>
            </li>
          </ul>
        </div>
      </div>

      <div id="_mainContent" class="roomMainContent">
        <div class="roomMainContent__roomHeader">【SAMPLE】サンプル共有ルーム</div>
        <div class="roomMainContent__currentSelectedRoom">
          <div id="CurrentSelectedRoom">
            <div id="_chatContent">
              <div class="fixture-messageStack">
                <p>本文エリア</p>
                <p>スクロール検証用の本文ブロック</p>
                <p>チャット欄の最下部テスト</p>
              </div>
            </div>
            <div id="_chatSendArea">送信エリア</div>
          </div>
        </div>
        <div id="_subContent" class="roomInformationContentContainer">
          <div id="_subContentArea" class="roomInformationContent">
            <h2 id="_subRoomInfoTitle">概要</h2>
            <p>予算、リンク、タスクなど</p>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
